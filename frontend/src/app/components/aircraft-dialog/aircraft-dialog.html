<h2 mat-dialog-title>
  {{ aircraft ? 'Editar Aeronave' : 'Nova Aeronave' }}
</h2>

<form [formGroup]="form" (ngSubmit)="save()">
  <mat-dialog-content class="dialog-content">
    <mat-form-field appearance="outline">
      <mat-label>Marca</mat-label>

      <mat-select formControlName="marca">
        <mat-option value="EMBRAER">Embraer</mat-option>
        <mat-option value="BOEING">Boeing</mat-option>
        <mat-option value="AIRBUS">Airbus</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Modelo</mat-label>

      <input matInput formControlName="nome" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Ano</mat-label>

      <input matInput type="number" formControlName="ano" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Vendido</mat-label>

      <mat-select formControlName="vendido">
        <mat-option [value]="true">Sim</mat-option>
        <mat-option [value]="false">Não</mat-option>
      </mat-select>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">Cancelar</button>

    <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
      Salvar
    </button>
  </mat-dialog-actions>
</form>
