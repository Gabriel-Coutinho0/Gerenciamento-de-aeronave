<mat-card class="table-card">
  <table mat-table [dataSource]="aircrafts()">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>

      <td mat-cell *matCellDef="let aircraft">
        {{ aircraft.id }}
      </td>
    </ng-container>

    <ng-container matColumnDef="marca">
      <th mat-header-cell *matHeaderCellDef>Marca</th>

      <td mat-cell *matCellDef="let aircraft">
        {{ aircraft.marca }}
      </td>
    </ng-container>

    <ng-container matColumnDef="nome">
      <th mat-header-cell *matHeaderCellDef>Modelo</th>

      <td mat-cell *matCellDef="let aircraft">
        {{ aircraft.nome }}
      </td>
    </ng-container>

    <ng-container matColumnDef="ano">
      <th mat-header-cell *matHeaderCellDef>Ano</th>

      <td mat-cell *matCellDef="let aircraft">
        {{ aircraft.ano }}
      </td>
    </ng-container>

    <ng-container matColumnDef="vendido">
      <th mat-header-cell *matHeaderCellDef>Vendido</th>

      <td mat-cell *matCellDef="let aircraft">
        @if (aircraft.vendido){
        <mat-icon style="color: green;">check</mat-icon>
        }
        @else{
        <mat-icon style="color: red;">close</mat-icon>
        }
      </td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef>Ações</th>

      <td mat-cell *matCellDef="let aircraft">
        <button mat-icon-button color="primary" (click)="onEdit(aircraft)">
          <mat-icon>edit</mat-icon>
        </button>

        <button mat-icon-button color="warn" (click)="onDelete(aircraft.id!)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</mat-card>
